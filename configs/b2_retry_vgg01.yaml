  checkpoint_dir: /content/drive/MyDrive/switchlight/checkpoints/b2_retry_vgg01
  log_path: /content/drive/MyDrive/switchlight/logs/b2_retry_vgg01_train.jsonl

loss:
  l1_weight: 1.0
  vgg_weight: 0.1
  vgg_pretrained: true
