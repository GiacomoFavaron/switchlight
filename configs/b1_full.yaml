seed: 5405

data:
  root: data/blender/dataset_augmented
  image_size: 384
  augment: true
  num_workers: 0

train:
  batch_size: 4
  max_steps: 200
  lr: 0.0001
  weight_decay: 0.0001
  checkpoint_every: 50
  log_every: 10
  checkpoint_dir: outputs/checkpoints/b1_full
  log_path: outputs/logs/b1_full_train.jsonl

loss:
  l1_weight: 1.0
  vgg_weight: 0.5
  vgg_pretrained: true
